<section id="home" class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <!-- Floating real SDG icons -->
  <div class="hero-sdg-cloud" aria-hidden="true">
    <img class="sdg-orb" src="TGG_Icon_Color_07.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_06.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_03.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_15.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_11.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_14.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_17.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_13.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_01.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_04.png" alt="" />
    <img class="sdg-orb" src="TGG_Icon_Color_09.png" alt="" />
  </div>

  <svg class="hero-leaf-svg" viewBox="0 0 64 64" aria-hidden="true">
    <defs>
      <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#facc15" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
      </linearGradient>
    </defs>
    <path fill="url(#leafGrad)" d="M32 4C18 8 6 22 6 36c0 14 12 24 26 24 0-14-6-26-18-32 16-2 28 6 36 22 0-20-8-40-18-46z"/>
  </svg>

  <div class="container hero-inner">
    <div class="hero-badge">
      <a href="https://www.polytechnic.bh/" target="_blank" rel="noopener noreferrer" aria-label="Bahrain Polytechnic website">
        <img class="hero-badge-logo" src="polytechnic-white.png" alt="Bahrain Polytechnic" />
      </a>
      <span class="hero-badge-divider" aria-hidden="true"></span>
      <a href="https://gulfuniversity.edu.bh/" target="_blank" rel="noopener noreferrer" aria-label="Gulf University website">
        <img class="hero-badge-logo" src="main-logo-white.png" alt="Gulf University" />
      </a>
    </div>

    <span class="hero-invite">Proudly invite you to</span>
    <h1 class="hero-title">
      Sustainability Week
      <img class="hero-logo" src="logo1.png" alt="Gulf University Sustainability Week 2026 logo" />
      <span class="hero-edition"><span class="hero-edition-text">3<sup>rd</sup> Edition</span></span>
    </h1>

    <p class="hero-theme">
      Under the theme:
      <em>"Co-innovating, Leading, Sustaining…"</em>
    </p>

    <div class="hero-meta">
      <div class="hero-meta-item">
        <i class="bi bi-geo-alt-fill"></i>
        <span>Gulf University Campus</span>
      </div>
      <div class="hero-meta-divider"></div>
      <div class="hero-meta-item">
        <i class="bi bi-calendar-event-fill"></i>
        <span>November 15<sup>th</sup> – 19<sup>th</sup>, 2026</span>
      </div>
    </div>

    <div class="hero-cta-wrap">
     <div class="hero-cta-group">
      <div class="hero-cta">
        <button type="button" class="btn btn--primary" (click)="reg.openChooser()">
          <i class="bi bi-pencil-square"></i>
          Register Now
        </button>
        <a href="https://icsdi.gulfuniversity.edu.bh/" target="_blank" rel="noopener noreferrer" class="btn btn--ghost">
          <img src="icsdi-favicon.ico" alt="" class="btn-icon" aria-hidden="true" />
          ICSDI Website
        </a>
      </div>

      <div class="hero-cta hero-cta--secondary">
        <button type="button" class="btn btn--keynote" (click)="reg.openType('Keynote Speaker')">
          <i class="bi bi-mic-fill"></i>
          Be A Keynote Speaker
        </button>
      </div>
     </div>
    </div>
  </div>

  <a href="#about" class="hero-scroll" aria-label="Scroll down">
    <i class="bi bi-chevron-double-down"></i>
  </a>
</section>
